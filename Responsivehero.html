<!DOCTYPE html>
<html>
<head>
<title>Hero Landing Page</title>

<style>

body{
margin:0;
font-family:Arial;
}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:50px;
background:#2c3e50;
color:white;
flex-wrap:wrap;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:40px;
}

.hero-text p{
font-size:18px;
}

button{
padding:10px 20px;
background:#e67e22;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.hero img{
width:300px;
border-radius:10px;
}

@media(max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.hero img{
margin-top:20px;
}

}

</style>

</head>

<body>

<div class="hero">

<div class="hero-text">

<h1>Welcome to My Website</h1>

<p>
Hello, I am Anusha G S.  
I am a Computer Science and Business Systems student passionate about Web Development and Technology.
</p>

<button>Learn More</button>

</div>

<div>

<img src="https://via.placeholder.com/300" alt="Hero Image">

</div>

</div>

</body>
</html>
